model_name: "cnn"

method: grid

metric:
  name: best_macro_f1
  goal: maximize

parameters:

  dropout:
    values:
      - 0.3
      - 0.5

  freeze_resnet:
    values:
      - true
      - false

  lr_backbone:
    values:
      - null
      - 0.001

  lr_head:
    values:
      - 0.001
      - 0.0005
