model_name: "bert"

method: grid

metric:
  name: best_macro_f1
  goal: maximize

parameters:
  max_len:
    values: [64, 128]

  dropout:
    values: [0.3, 0.5]

  learning_rate:
    values: [0.001, 0.0005, 0.00002, 0.00005]

  freeze_bert:
    values: [true, false]

  batch_size:
    value: 32

  hidden_dim:
    value: 256
