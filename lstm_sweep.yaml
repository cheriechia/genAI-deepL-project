model_name: "lstm"

method: grid

metric:
  name: best_macro_f1
  goal: maximize

parameters:
  max_len:
    values: [32, 64, 128]

  embed_dim:
    values: [50, 100]

  learning_rate:
    values: [0.001, 0.0005]

  dropout:
    values: [0.3, 0.5, 0.6]

  hidden_dim:
    values: [32, 64, 128]
  
  batch_size:
    value: 32

