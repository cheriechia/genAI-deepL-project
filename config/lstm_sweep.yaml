method: bayes

metric:
  name: best_macro_f1
  goal: maximize

parameters:
  model_name:
    value: "lstm"

  epochs: 
    value: 50  

  max_len:
    values: [32, 64, 128]

  embed_dim:
    values: [50, 100]

  learning_rate:
    min: 0.0005
    max: 0.001
    distribution: log_uniform_values

  dropout:
    min: 0.3
    max: 0.6

  hidden_dim:
    values: [32, 64, 128]
  
  batch_size:
    value: 32

